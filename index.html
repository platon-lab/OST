<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLATON GAMES OST</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --panel-bg: #1a1c28;
            --accent-color: #ff4757;
            --accent-hover: #ff6b81;
            --text-color: #f1f2f6;
            --text-muted: #a4b0be;
            --player-bg: #222538;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            max-width: 800px;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--accent-color), #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 2px 8px rgba(255, 71, 87, 0.3));
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .playlist-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            padding: 0 1rem;
        }

        .track-card {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s ease, border-color 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .track-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 71, 87, 0.3);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .track-icon {
            background: rgba(255, 71, 87, 0.1);
            color: var(--accent-color);
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .track-title {
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-grow: 1;
        }

        audio {
            width: 100%;
            border-radius: 8px;
            outline: none;
        }

        /* Стилізація стандартного плеєра для сучасних браузерів */
        audio::-webkit-media-controls-panel {
            background-color: var(--player-bg);
        }
        audio::-webkit-media-controls-current-time-display,
        audio::-webkit-media-controls-time-remaining-display {
            color: var(--text-color);
        }

        footer {
            margin-top: auto;
            padding-top: 3rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 2rem;
            }
            .playlist-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>
        // Автоматично зупиняє інші плеєри, якщо вмикається новий
        const audios = document.querySelectorAll('audio');
        audios.forEach(audio => {
            audio.addEventListener('play', () => {
                audios.forEach(otherAudio => {
                    if (otherAudio !== audio) {
                        otherAudio.pause();
                    }
                });
            });
        });
    </script>
